<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Dark</title><style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
}

/* Header */
h1 {
  margin-top: 60px;
  font-size: 45px;
  text-shadow: 0 0 15px #00ffcc;
}

/* Line */
.line {
  width: 200px;
  height: 2px;
  background: #00ffcc;
  margin: 20px auto;
  box-shadow: 0 0 10px #00ffcc;
}

/* Text */
p {
  color: #aaa;
  font-size: 16px;
}

/* Buttons */
.btn {
  display: inline-block;
  margin: 15px;
  padding: 10px 20px;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 15px #00ffcc;
}

/* Footer */
footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  color: #555;
  font-size: 12px;
}
</style></head><body><h1>CYBER DARK</h1>
<div class="line"></div><p id="typing"></p><div>
  <a href="#" class="btn">Discord</a>
  <a href="#" class="btn">GitHub</a>
  <a href="#" class="btn">Contact</a>
</div><footer>
  © 2026 - sLaZerCopyWrite
</footer><script>
// Typing effect
const text = "sLaZer WebSite";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 40);
  }
}
type();
</script></body>
</html>
