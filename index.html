<head>
<meta charset="UTF-8">
<title>Cyber Dark</title><style>
body {

}

/* Header */
h1 {

}

.line {

  display: inline-block;

  padding: 10px 20px;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  text-decoration: none;

}

.btn:hover {
  background: #00ffcc;
  color: black;

</style></head><body><h1>CYBER sLaZer</h1>

</div><footer>

</footer><script>
// Typing effect
const text = "sLaZer WebSite
  Who is CybersLaZer?

Cybersecurity Ethical Hacking. OPSEC Digital Privacy

CybersLaZer is a cybersecurity specialist and ethical hacker focused on operational security (OPSEC), data protection and digital privacy.

Known online as sLaZer, he creates content related to cybersecurity, OSINT and digital risk awareness, helping people better understand how to protect their personal data.

</html>
