```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Dark</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:#00ffcc;
font-family:monospace;
text-align:center;
overflow:hidden;
}

/* Matrix background */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Main box */
.container{
margin-top:90px;
padding:20px;
}

h1{
font-size:50px;
text-shadow:0 0 15px #00ffcc;
margin-bottom:10px;
}

.line{
width:220px;
height:2px;
background:#00ffcc;
margin:15px auto;
box-shadow:0 0 15px #00ffcc;
}

#typing{
width:80%;
margin:auto;
color:#cccccc;
font-size:16px;
line-height:1.8;
min-height:220px;
white-space:pre-line;
}

/* Buttons */
.btn{
display:inline-block;
margin:10px;
padding:12px 22px;
border:1px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:#00ffcc;
color:#000;
box-shadow:0 0 20px #00ffcc;
}

/* Footer */
footer{
position:fixed;
bottom:10px;
width:100%;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>CYBER sLaZer</h1>
<div class="line"></div>

<p id="typing"></p>

<div>
<a href="https://discord.com" class="btn" target="_blank">Discord</a>
<a href="https://github.com" class="btn" target="_blank">GitHub</a>
<a href="https://instagram.com" class="btn" target="_blank">Instagram</a>
</div>
</div>

<footer>
© 2026 sLaZer CopyRight
</footer>

<script>
/* Typing Effect */
const text = `Who is Cyber Dark?

Cybersecurity • Ethical Hacking • OPSEC • Privacy

Cyber Dark is a cybersecurity specialist focused on
digital privacy, OSINT, and online protection.

Known online for sharing security awareness content,
he helps people understand how to stay safe online.

Access Granted...`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, 35);
}
}
typeWriter();

/* Matrix Effect */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x=0; x<columns; x++){
drops[x]=1;
}

function draw(){
ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff66";
ctx.font = fontSize + "px monospace";

for(let i=0; i<drops.length; i++){
const text = letters.charAt(Math.floor(Math.random()*letters.length));
ctx.fillText(text, i*fontSize, drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
```
